<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Transcendence - Pokémon Edition</title>
  </head>
  <body class="bg-gray-900 text-white min-h-screen flex flex-col items-center justify-center">
    <div id="app" class="text-center w-full max-w-screen-xl p-4">
      <h1 class="text-4xl font-bold mb-4 text-yellow-400 drop-shadow-md">Transcendence MVP</h1>
      <p class="mb-4 text-gray-300">Conectando al Motor del Tablero...</p>
      
      <div class="relative inline-block border-4 border-gray-700 rounded-lg overflow-hidden bg-gray-800 shadow-2xl">
        <canvas id="game-canvas" width="1200" height="950"></canvas>
        <div id="entities-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none"></div>
        <div id="hud-container" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none z-50">
           <!-- Player 1 (Left) -->
           <div id="hud-p1" class="flex items-center gap-3 bg-gray-900 bg-opacity-80 p-2 rounded-lg border-2 border-gray-600 shadow-lg hidden">
              <img id="hud-p1-avatar" src="" class="w-16 h-16 object-contain bg-gray-800 rounded border border-gray-500 p-1" style="image-rendering: pixelated;" />
              <div class="flex flex-col">
                 <div class="text-xs text-yellow-400 mb-1 drop-shadow" style="font-family: 'Press Start 2P', monospace;" id="hud-p1-name">Player 1</div>
                 <div class="w-48 h-5 bg-gray-700 rounded overflow-hidden border-2 border-gray-900 relative shadow-inner">
                    <div id="hud-p1-hp-bar" class="h-full bg-green-500 transition-all duration-300 w-full"></div>
                    <div id="hud-p1-hp-text" class="absolute inset-0 flex items-center justify-center text-[10px] text-white drop-shadow-md" style="font-family: 'Press Start 2P', monospace;">100/100</div>
                 </div>
              </div>
           </div>
        
           <!-- Player 2 (Right) -->
           <div id="hud-p2" class="flex items-center gap-3 bg-gray-900 bg-opacity-80 p-2 rounded-lg border-2 border-gray-600 shadow-lg hidden flex-row-reverse text-right">
              <img id="hud-p2-avatar" src="" class="w-16 h-16 object-contain bg-gray-800 rounded border border-gray-500 p-1" style="image-rendering: pixelated;" />
              <div class="flex flex-col items-end">
                 <div class="text-xs text-yellow-400 mb-1 drop-shadow" style="font-family: 'Press Start 2P', monospace;" id="hud-p2-name">Player 2</div>
                 <div class="w-48 h-5 bg-gray-700 rounded overflow-hidden border-2 border-gray-900 relative shadow-inner flex justify-end">
                    <div id="hud-p2-hp-bar" class="h-full bg-green-500 transition-all duration-300 w-full"></div>
                    <div id="hud-p2-hp-text" class="absolute inset-0 flex items-center justify-center text-[10px] text-white drop-shadow-md" style="font-family: 'Press Start 2P', monospace;">100/100</div>
                 </div>
              </div>
           </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
