<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Transcendence - Pokémon Edition</title>
  </head>
  <body class="bg-gray-950 text-white min-h-screen flex flex-col items-center justify-center overflow-hidden">
    <div id="app" class="w-full h-dvh overflow-hidden relative flex items-center justify-center bg-gray-950">

      <!-- Fullscreen layer for Welcome/Cinematics -->
      <div id="welcome-layer" class="absolute inset-0 z-[100] flex items-center justify-center bg-black empty:hidden pointer-events-none"></div>

      <!-- Fullscreen layer for Inventory (ocupa toda la pantalla, como el mapa) -->
      <div id="inventory-layer" class="absolute inset-0 z-[90] hidden bg-gray-950 overflow-hidden"></div>

      <!-- CAPA DE MENÚS (HUB) — a tamaño REAL del dispositivo (fuera del lienzo
           escalado) para que los breakpoints responsive de Tailwind respondan al
           viewport real. Scroll propio en pantallas bajas. Ver docs/10-RESPONSIVE.md. -->
      <div id="hub-layer" class="absolute inset-0 z-[80] flex flex-col items-center bg-gray-900 overflow-y-auto overscroll-contain transition-opacity duration-500"></div>

      <!-- CAPA DE DRAFT (selección de equipos) — también a tamaño real. -->
      <div id="draft-layer" class="absolute inset-0 z-[85] hidden overflow-y-auto overscroll-contain bg-gray-900"></div>

      <!-- OVERLAY DE ROTACIÓN — se muestra sobre el TABLERO en móvil vertical
           (el tablero 16:10 no es jugable en portrait). Controlado desde main.ts. -->
      <div id="rotate-overlay" class="absolute inset-0 z-[95] hidden flex-col items-center justify-center gap-6 bg-black text-center px-8">
        <div class="text-6xl animate-pulse">📱 ↻</div>
        <p class="text-yellow-400 text-sm sm:text-base leading-relaxed" style="font-family:'Press Start 2P',monospace;">GIRA EL DISPOSITIVO</p>
        <p class="text-gray-300 text-[10px] sm:text-xs leading-relaxed max-w-xs" style="font-family:'Press Start 2P',monospace;">El tablero se juega en horizontal</p>
      </div>

      <!-- CONTENEDOR GENERAL ESCALABLE -->
      <div id="game-container" class="relative flex items-center justify-center gap-6" style="transform-origin: center; transition: transform 0.2s ease;">
        
        <!-- GAME WRAPPER (EL CANVA DEL JUEGO - 1600x1000) -->
        <div id="game-wrapper" class="relative flex items-center justify-center overflow-hidden border-[8px] border-[#0a0a0a] bg-gray-900 shadow-[0_0_30px_rgba(0,0,0,1)] rounded-lg" style="width: 1600px; height: 1000px; flex-shrink: 0;">

          <!-- NOTA: #hub-layer y #draft-layer se movieron a nivel de #app (tamaño real
               del dispositivo). Aquí solo queda el TABLERO, que sí usa el lienzo
               1600×1000 escalado. Ver docs/10-RESPONSIVE.md. -->

          <!-- Game Layer -->
          <div id="game-layer" class="absolute inset-0 z-10 hidden bg-black flex overflow-hidden">
            
            <!-- LIENZO DE JUEGO (JUEGO + HUD) -->
            <div id="game-viewport" class="relative w-full h-full overflow-hidden bg-gray-900">
              <canvas id="game-canvas" width="1600" height="1000" class="absolute inset-0 bg-gray-800 shadow-inner"></canvas>
              <!-- z-30 crea un contexto de apilamiento propio: los z-index dinámicos
                   (altos, según la Y) de los sprites quedan CONTENIDOS aquí y no se
                   cuelan por encima del HUD (z-40/z-50) ni de los overlays. -->
              <div id="entities-layer" class="absolute inset-0 pointer-events-none z-30"></div>
              <!-- Capa de efectos de feedback (números flotantes, flashes, tweens).
                   Separada de entities-layer (que borra hijos que no son ocupantes).
                   Va después en el DOM con z-30 → pinta sobre los sprites, bajo el HUD. -->
              <div id="fx-layer" class="absolute inset-0 pointer-events-none z-30"></div>

              <!-- HUD SUPERIOR (P1 y P2) -->
              <div id="hud-container" class="absolute top-0 left-0 w-full p-4 flex justify-between items-start pointer-events-none z-50">
                <!-- Player 1 (Top-Left - Azul) -->
                <div id="hud-p1" class="flex flex-col gap-1.5 bg-gray-900 bg-opacity-85 p-2 rounded-lg border-2 border-blue-500 shadow-lg hidden pointer-events-auto cursor-pointer transition-transform hover:scale-105">
                  <div class="flex items-center gap-3">
                    <!-- Marco entrenador (a la izquierda) -->
                    <div class="w-16 h-16 bg-gray-800 rounded border-2 border-blue-400 p-1 flex items-center justify-center flex-shrink-0 shadow-inner">
                      <img id="hud-p1-trainer" src="https://play.pokemonshowdown.com/sprites/trainers/red.png" class="w-14 h-14 object-contain" style="image-rendering: pixelated;" title="Entrenador" />
                    </div>
                    <img id="hud-p1-avatar" src="" class="w-16 h-16 object-contain bg-gray-800 rounded border border-blue-400 p-1 flex-shrink-0" style="image-rendering: pixelated;" title="Pokémon activo" />
                    <div class="flex flex-col">
                        <div class="text-xs text-blue-400 mb-1 drop-shadow" style="font-family: 'Press Start 2P', monospace;" id="hud-p1-name">Player 1</div>
                        <div class="w-44 h-5 bg-gray-700 rounded overflow-hidden border-2 border-gray-900 relative shadow-inner">
                          <div id="hud-p1-hp-bar" class="h-full bg-green-500 transition-all duration-300 w-full"></div>
                          <div id="hud-p1-hp-text" class="absolute inset-0 flex items-center justify-center text-[9px] leading-none pt-1 text-white drop-shadow-md" style="font-family: 'Press Start 2P', monospace;">100/100</div>
                        </div>
                        <div id="hud-p1-res" class="mt-1 text-[8px] text-white flex gap-2" style="font-family: 'Press Start 2P', monospace;"></div>
                    </div>
                  </div>
                  <!-- Miniaturas equipo -->
                  <div id="hud-p1-team" class="flex items-center gap-1.5 pt-1 border-t border-gray-700 w-full"></div>
                </div>

                <!-- Reset button (Top Center) -->
                <button id="btn-reset" class="bg-gray-800 hover:bg-gray-700 text-white text-[8px] px-3 py-2 rounded border-b-4 border-gray-900 active:border-b-0 active:mt-1 pointer-events-auto shadow-lg" style="font-family: 'Press Start 2P', monospace;">REINICIAR</button>

                <!-- Player 2 (Top-Right - Rojo) -->
                <div id="hud-p2" class="flex flex-col gap-1.5 bg-gray-900 bg-opacity-85 p-2 rounded-lg border-2 border-red-500 shadow-lg hidden pointer-events-auto cursor-pointer transition-transform hover:scale-105">
                  <div class="flex items-center gap-3 flex-row-reverse text-right">
                    <!-- Marco entrenador (mismo orden DOM que P1 → espejo por flex-row-reverse) -->
                    <div class="w-16 h-16 bg-gray-800 rounded border-2 border-red-400 p-1 flex items-center justify-center flex-shrink-0 shadow-inner">
                      <img id="hud-p2-trainer" src="https://play.pokemonshowdown.com/sprites/trainers/blue.png" class="w-14 h-14 object-contain" style="image-rendering: pixelated;" title="Entrenador" />
                    </div>
                    <img id="hud-p2-avatar" src="" class="w-16 h-16 object-contain bg-gray-800 rounded border border-red-400 p-1 flex-shrink-0" style="image-rendering: pixelated;" title="Pokémon activo" />
                    <div class="flex flex-col items-end">
                        <div class="text-xs text-red-400 mb-1 drop-shadow" style="font-family: 'Press Start 2P', monospace;" id="hud-p2-name">Player 2</div>
                        <div class="w-44 h-5 bg-gray-700 rounded overflow-hidden border-2 border-gray-900 relative shadow-inner flex justify-end">
                          <div id="hud-p2-hp-bar" class="h-full bg-green-500 transition-all duration-300 w-full"></div>
                          <div id="hud-p2-hp-text" class="absolute inset-0 flex items-center justify-center text-[9px] leading-none pt-1 text-white drop-shadow-md" style="font-family: 'Press Start 2P', monospace;">100/100</div>
                        </div>
                        <div id="hud-p2-res" class="mt-1 text-[8px] text-white flex gap-2 justify-end" style="font-family: 'Press Start 2P', monospace;"></div>
                    </div>
                  </div>
                  <!-- Miniaturas equipo -->
                  <div id="hud-p2-team" class="flex items-center justify-end gap-1.5 pt-1 border-t border-gray-700 w-full"></div>
                </div>
              </div>

              <!-- HUD INFERIOR (P3 y P4) -->
              <div id="hud-bottom-container" class="absolute bottom-20 left-0 w-full px-4 flex justify-between items-end pointer-events-none z-40">
                <!-- Player 3 (Bottom-Left - Violeta) -->
                <div id="hud-p3" class="flex flex-col gap-1 bg-gray-900 bg-opacity-85 p-2 rounded-lg border-2 border-purple-500 shadow-lg hidden pointer-events-auto cursor-pointer transition-transform hover:scale-105">
                  <div class="flex items-center gap-2">
                    <!-- Marco entrenador -->
                    <div class="w-14 h-14 bg-gray-800 rounded border-2 border-purple-400 p-1 flex items-center justify-center flex-shrink-0 shadow-inner">
                      <img id="hud-p3-trainer" src="https://play.pokemonshowdown.com/sprites/trainers/cynthia.png" class="w-12 h-12 object-contain" style="image-rendering: pixelated;" title="Entrenador" />
                    </div>
                    <img id="hud-p3-avatar" src="" class="w-14 h-14 object-contain bg-gray-800 rounded border border-purple-400 p-1 flex-shrink-0" style="image-rendering: pixelated;" title="Pokémon activo" />
                    <div class="flex flex-col">
                        <div class="text-[10px] text-purple-400 mb-1 drop-shadow" style="font-family: 'Press Start 2P', monospace;" id="hud-p3-name">Player 3</div>
                        <div class="w-40 h-4 bg-gray-700 rounded overflow-hidden border-2 border-gray-900 relative shadow-inner">
                          <div id="hud-p3-hp-bar" class="h-full bg-green-500 transition-all duration-300 w-full"></div>
                          <div id="hud-p3-hp-text" class="absolute inset-0 flex items-center justify-center text-[8px] leading-none pt-0.5 text-white drop-shadow-md" style="font-family: 'Press Start 2P', monospace;">100/100</div>
                        </div>
                        <div id="hud-p3-res" class="mt-1 text-[8px] text-white flex gap-2" style="font-family: 'Press Start 2P', monospace;"></div>
                    </div>
                  </div>
                  <!-- Miniaturas equipo -->
                  <div id="hud-p3-team" class="flex items-center gap-1 pt-1 border-t border-gray-700 w-full"></div>
                </div>

                <!-- Player 4 (Bottom-Right - Amarillo) -->
                <div id="hud-p4" class="flex flex-col gap-1 bg-gray-900 bg-opacity-85 p-2 rounded-lg border-2 border-yellow-500 shadow-lg hidden pointer-events-auto cursor-pointer transition-transform hover:scale-105">
                  <div class="flex items-center gap-2 flex-row-reverse text-right">
                    <!-- Marco entrenador (mismo orden DOM que P3 → espejo por flex-row-reverse) -->
                    <div class="w-14 h-14 bg-gray-800 rounded border-2 border-yellow-400 p-1 flex items-center justify-center flex-shrink-0 shadow-inner">
                      <img id="hud-p4-trainer" src="https://play.pokemonshowdown.com/sprites/trainers/ethan.png" class="w-12 h-12 object-contain" style="image-rendering: pixelated;" title="Entrenador" />
                    </div>
                    <img id="hud-p4-avatar" src="" class="w-14 h-14 object-contain bg-gray-800 rounded border border-yellow-400 p-1 flex-shrink-0" style="image-rendering: pixelated;" title="Pokémon activo" />
                    <div class="flex flex-col items-end">
                        <div class="text-[10px] text-yellow-400 mb-1 drop-shadow" style="font-family: 'Press Start 2P', monospace;" id="hud-p4-name">Player 4</div>
                        <div class="w-40 h-4 bg-gray-700 rounded overflow-hidden border-2 border-gray-900 relative shadow-inner flex justify-end">
                          <div id="hud-p4-hp-bar" class="h-full bg-green-500 transition-all duration-300 w-full"></div>
                          <div id="hud-p4-hp-text" class="absolute inset-0 flex items-center justify-center text-[8px] leading-none pt-0.5 text-white drop-shadow-md" style="font-family: 'Press Start 2P', monospace;">100/100</div>
                        </div>
                        <div id="hud-p4-res" class="mt-1 text-[8px] text-white flex gap-2 justify-end" style="font-family: 'Press Start 2P', monospace;"></div>
                    </div>
                  </div>
                  <!-- Miniaturas equipo -->
                  <div id="hud-p4-team" class="flex items-center justify-end gap-1 pt-1 border-t border-gray-700 w-full"></div>
                </div>
              </div>

              <!-- BARRA DE TURNO Y BOTÓN FINALIZAR TURNO (INFERIOR CENTRO) -->
              <div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 z-50 pointer-events-auto">
                <div id="action-panel" class="hidden flex gap-2 mb-2 p-2 bg-gray-900 bg-opacity-90 border-2 border-gray-700 rounded-lg shadow-lg pointer-events-auto">
                  <!-- Movimientos inyectados aquí por HUDView -->
                </div>
                
                <div class="flex items-center gap-4">
                  <div id="turn-banner" class="hidden bg-black bg-opacity-80 border-2 border-yellow-400 rounded-lg px-4 py-2 text-center shadow-lg">
                    <div id="turn-player" class="text-[10px] text-yellow-400" style="font-family: 'Press Start 2P', monospace;">TURNO</div>
                    <div id="turn-number" class="text-[8px] text-gray-300 mt-1" style="font-family: 'Press Start 2P', monospace;">Turno 1</div>
                  </div>

                  <button id="btn-end-turn" class="bg-gradient-to-r from-yellow-500 to-red-600 hover:from-yellow-400 hover:to-red-500 text-black font-bold text-xs px-6 py-3 rounded-lg border-2 border-yellow-300 shadow-[0_0_15px_rgba(234,179,8,0.5)] cursor-pointer transition-all duration-200 hover:scale-105 active:scale-95 uppercase tracking-wider" style="font-family: 'Press Start 2P', monospace;">
                    FINALIZAR TURNO ▶
                  </button>
                </div>
              </div>

              <!-- Toast feedback -->
              <div id="toast" class="absolute top-16 left-1/2 -translate-x-1/2 hidden bg-red-700 border-2 border-red-300 text-white text-[10px] px-4 py-2 rounded-lg shadow-lg z-50" style="font-family: 'Press Start 2P', monospace;"></div>

              <!-- Combat overlay -->
              <div id="combat-overlay" class="absolute inset-0 hidden z-[70]"></div>

              <!-- Win overlay -->
              <div id="win-overlay" class="absolute inset-0 hidden items-center justify-center bg-black bg-opacity-80 z-[60]">
                <div class="bg-blue-900 border-4 border-yellow-400 rounded-lg p-8 text-center shadow-2xl" style="max-width:min(440px,92vw);">
                  <div class="text-2xl text-yellow-400 mb-4" style="font-family: 'Press Start 2P', monospace; text-shadow: 2px 2px 0 #000;">¡VICTORIA!</div>
                  <div id="win-text" class="text-xs text-white mb-4" style="font-family: 'Press Start 2P', monospace;"></div>
                  <div id="win-rewards" class="mb-6"></div>
                  <div class="flex flex-wrap gap-3 justify-center">
                    <button id="btn-rematch" class="bg-green-600 hover:bg-green-500 text-white text-xs px-6 py-3 rounded border-b-4 border-green-800 active:border-b-0 active:mt-1" style="font-family: 'Press Start 2P', monospace;">REVANCHA</button>
                    <button id="btn-win-menu" class="bg-gray-700 hover:bg-gray-600 text-white text-xs px-6 py-3 rounded border-b-4 border-gray-900 active:border-b-0 active:mt-1" style="font-family: 'Press Start 2P', monospace;">◀ MENÚ</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- SIDEBAR DERECHO (COMPLETAMENTE FUERA DEL CANVA - w-[360px]) -->
        <div id="right-sidebar" class="w-[360px] h-[1000px] hidden bg-gray-950 border-[8px] border-[#0a0a0a] flex flex-col z-50 shadow-[0_0_30px_rgba(0,0,0,1)] overflow-hidden flex-shrink-0 rounded-lg">
          <!-- 1. Superior: Minimapa + Botón Abandonar -->
          <div class="p-3 border-b-2 border-gray-800 flex flex-col items-center bg-gray-900 bg-opacity-80 flex-shrink-0">
            <div class="flex justify-between items-center w-full mb-2">
              <div class="text-[10px] text-yellow-400 tracking-wider font-bold" style="font-family: 'Press Start 2P', monospace;">MINIMAPA</div>
              <button id="btn-abandon" class="bg-red-900 hover:bg-red-700 text-red-200 hover:text-white text-[8px] px-2.5 py-1 rounded border border-red-500 transition shadow cursor-pointer font-bold flex items-center gap-1" style="font-family: 'Press Start 2P', monospace;" title="Abandonar partida (Equivale a derrota)">
                ✖ ABANDONAR
              </button>
            </div>
            <canvas id="minimap" width="320" height="200" class="block rounded border-2 border-gray-700 bg-black cursor-pointer shadow-inner w-full"></canvas>
          </div>

          <!-- 2. Medio: Narrador de Actividad -->
          <div class="h-64 p-3 border-b-2 border-gray-800 flex flex-col overflow-hidden bg-black bg-opacity-70 flex-shrink-0">
            <div class="text-xs text-blue-400 font-bold mb-2 flex items-center gap-2 flex-shrink-0" style="font-family: 'Press Start 2P', monospace;">
              <span class="inline-block w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse"></span>NARRADOR
            </div>
            <div id="event-log" class="flex-1 overflow-y-auto space-y-2.5 text-[13px] text-gray-100 font-mono font-semibold pr-2 scrollbar-thin scrollbar-thumb-gray-700 leading-normal"></div>
          </div>

          <!-- 3. Inferior: Chat Interactivo -->
          <div id="chat-panel" class="flex-1 p-3 flex flex-col bg-gray-900 bg-opacity-95 min-h-0 overflow-hidden">
            <div class="text-xs text-green-400 font-bold mb-2 flex items-center gap-2 flex-shrink-0" style="font-family: 'Press Start 2P', monospace;">
              <span class="inline-block w-2.5 h-2.5 rounded-full bg-green-500"></span>CHAT DE SALA
            </div>
            <div id="chat-messages" class="flex-1 overflow-y-auto space-y-2 mb-2 text-[13px] text-gray-100 font-mono font-semibold p-2.5 rounded border border-gray-700 bg-black bg-opacity-80 flex flex-col leading-normal"></div>
            <form id="chat-form" class="flex gap-1.5 flex-shrink-0">
              <input id="chat-input" type="text" placeholder="Escribe un mensaje..." class="flex-1 bg-gray-800 text-white text-xs px-3 py-2 rounded border border-gray-500 focus:outline-none focus:border-yellow-400 font-mono font-semibold" autocomplete="off" />
              <button id="chat-send" type="submit" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] px-4 py-2 rounded border border-blue-400 font-bold" style="font-family: 'Press Start 2P', monospace;">ENVIAR</button>
            </form>
          </div>
        </div>

      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
