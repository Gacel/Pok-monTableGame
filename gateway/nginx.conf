events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream hello_backend {
        server hello:3000;
    }
    upstream game_backend {
        server game-service:3001;
    }
    upstream frontend_backend {
        server frontend:5173;
    }

    # HTTP (80): challenge ACME de Let's Encrypt + redirección a HTTPS
    server {
        listen 80;
        server_name 42transcendence.com www.42transcendence.com poke.42transcendence.com www.poke.42transcendence.com localhost;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name 42transcendence.com www.42transcendence.com poke.42transcendence.com www.poke.42transcendence.com localhost;

        # Let's Encrypt (renovado por el servicio certbot vía webroot)
        ssl_certificate /etc/letsencrypt/live/42transcendence.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/42transcendence.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configuración para WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Enrutamiento según requerimientos.
        # NOTA (transición): hasta que existan auth-service y user-service como
        # microservicios propios, game-service expone /api/auth y /api/users.
        # Ver docs/ARCHITECTURE.md §3.
        location /api/auth {
            proxy_pass http://game_backend;
        }

        location /api/users {
            proxy_pass http://game_backend;
        }

        location /api/game {
            proxy_pass http://game_backend;
        }

        # Lobby multijugador (crear/buscar/unirse a partidas) — game-service.
        location /api/lobby {
            proxy_pass http://game_backend;
        }

        location /api/poke {
            proxy_pass http://game_backend;
        }

        # WebSockets (sync de tablero + chat) — servidos por game-service.
        location /ws {
            proxy_pass http://game_backend;
        }

        location /health {
            proxy_pass http://hello_backend/health;
        }

        # Frontend (SPA)
        location / {
            proxy_pass http://frontend_backend;
        }
    }
}
