events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream hello_backend {
        server hello:3000;
    }
    upstream game_backend {
        server game-service:3001;
    }
    upstream frontend_backend {
        server frontend:5173;
    }

    # zi.irishawk.com NO pertenece a este proyecto: nginx responde 404 y NO sirve
    # la SPA (ni en HTTP ni en HTTPS). Al ser un server_name exacto, gana a los
    # bloques por defecto. Reutiliza el certificado existente solo para poder
    # completar el handshake TLS y devolver el 404 (el nombre no coincidirá, pero
    # el objetivo es no servir este proyecto en ese dominio).
    server {
        listen 80;
        listen 443 ssl;
        server_name zi.irishawk.com;
        ssl_certificate /etc/letsencrypt/live/42transcendence.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/42transcendence.com/privkey.pem;
        return 404;
    }

    # HTTP (80): challenge ACME de Let's Encrypt + redirección a HTTPS
    server {
        listen 80;
        server_name 42transcendence.com www.42transcendence.com poke.42transcendence.com www.poke.42transcendence.com localhost;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name 42transcendence.com www.42transcendence.com poke.42transcendence.com www.poke.42transcendence.com localhost;

        # Let's Encrypt (renovado por el servicio certbot vía webroot)
        ssl_certificate /etc/letsencrypt/live/42transcendence.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/42transcendence.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # --- Cabeceras de seguridad (defensa en profundidad) ---
        # NOTA: script-src incluye 'unsafe-inline'/'unsafe-eval' porque en
        # producción se sirve el DEV server de Vite (HMR). Con un build de
        # producción (vite build) podría endurecerse a script-src 'self'.
        # Ver docs/audit/SECURITY_AUDIT.md (frontend #4).
        # NOTA: el dev server de Vite crea web workers desde blob: y usa eval;
        # por eso script-src/worker-src incluyen blob:. Con un build de producción
        # podrían quitarse.
        set $csp "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://play.pokemonshowdown.com https://raw.githubusercontent.com https://pokeapi.co; connect-src 'self' https://pokeapi.co https://raw.githubusercontent.com wss: ws:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'";
        add_header Content-Security-Policy $csp always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configuración para WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Enrutamiento según requerimientos.
        # NOTA (transición): hasta que existan auth-service y user-service como
        # microservicios propios, game-service expone /api/auth y /api/users.
        # Ver docs/ARCHITECTURE.md §3.
        location /api/auth {
            proxy_pass http://game_backend;
        }

        location /api/users {
            proxy_pass http://game_backend;
        }

        location /api/game {
            proxy_pass http://game_backend;
        }

        # Lobby multijugador (crear/buscar/unirse a partidas) — game-service.
        location /api/lobby {
            proxy_pass http://game_backend;
        }

        location /api/poke {
            proxy_pass http://game_backend;
        }

        # WebSockets (sync de tablero + chat) — servidos por game-service.
        location /ws {
            proxy_pass http://game_backend;
        }

        location /health {
            proxy_pass http://hello_backend/health;
        }

        # Frontend (SPA)
        location / {
            proxy_pass http://frontend_backend;
        }
    }
}
