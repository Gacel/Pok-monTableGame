# docker-compose.yml — orquestación total (ver docs/02-LOCAL_DEV.md)
# Fase 0: solo el servicio temporal `hello` para validar el pipeline.
# A medida que avance el plan se añadirán: gateway, vault, auth-service, etc.

services:
  hello:
    build:
      context: ./services/_hello
    container_name: transcendence-hello
    environment:
      PORT: 3000
      LOG_LEVEL: info
    networks:
      - transcendence-net
    restart: unless-stopped
  gateway:
    build:
      context: ./gateway
    container_name: transcendence-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - hello
      - game-service
      - frontend
    networks:
      - transcendence-net
    restart: unless-stopped
  certbot:
    image: certbot/certbot
    container_name: transcendence-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    networks:
      - transcendence-net
  game-service:
    build:
      # Contexto en la raíz: la imagen necesita packages/shared (npm workspaces).
      context: .
      dockerfile: services/game-service/Dockerfile
    container_name: transcendence-game-service
    env_file:
      - .env
    environment:
      PORT: 3001
      LOG_LEVEL: info
    volumes:
      - game-data:/app/services/game-service/data
    networks:
      - transcendence-net
    restart: unless-stopped
  frontend:
    build:
      # Contexto en la raíz: la imagen necesita packages/shared (npm workspaces).
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: transcendence-frontend
    networks:
      - transcendence-net
    restart: unless-stopped

networks:
  transcendence-net:
    name: transcendence-net
    driver: bridge

# Volúmenes nombrados (uno por BD SQLite / dato persistente).
# Se irán usando conforme se añadan servicios con estado.
volumes:
  auth-data:
  user-data:
  game-data:
  status-data:
  mail-data:
  vault-data:
  redis-data:
  rabbitmq-data:
  letsencrypt:
  certbot_webroot:
